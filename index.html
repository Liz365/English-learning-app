<head>

        .module-card { background: white; border: 2px solid #bdc3c7; border-radius: 18px; padding: 0; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.03); overflow: hidden; transition: all 0.3s ease; }
        .card-header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; background: white; user-select: none; }
        .card-header:active { background: #fcf8ff; }
        .header-main-info { display: flex; align-items: center; gap: 15px; }
        .avatar-circle { width: 50px; height: 50px; background: #e1f5fe; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #b3e5fc; }

        .title-amh { font-size: 18px; font-weight: bold; color: #2c3e50; }
        .title-eng { font-size: 14px; color: #7f8c8d; margin-top: 2px; }
        .chevron { font-size: 20px; color: #95a5a6; transition: transform 0.3s ease; }
        .card-content { max-height: 0; opacity: 0; padding: 0 20px; background: #fafbfc; transition: max-height 0.3s ease-out, opacity 0.2s ease, padding 0.3s ease; }
        .module-card.active { border-color: #8e44ad; box-shadow: 0 6px 15px rgba(142, 68, 173, 0.15); }
        .module-card.active .card-content { max-height: 4000px; opacity: 1; padding: 20px; border-top: 2px dashed #f1c40f; }
        .module-card.active .chevron { transform: rotate(180deg); color: #8e44ad; }
        
        .section-divider { font-size: 14px; font-weight: bold; color: #8e44ad; background: #f1f0f4; padding: 6px 12px; border-radius: 8px; margin: 15px 0 8px 0; display: inline-block; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .bubble { margin: 10px 0; padding: 14px; border-radius: 15px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.02); transition: transform 0.1s ease; display: block; }
        .bubble:active { transform: scale(0.98); }
        .char-A { background: #e8f4fd; border-left: 5px solid #3498db; margin-right: 20px;}
        .char-B { background: #eafaf1; border-right: 5px solid #2ecc71; margin-left: 20px; text-align: right;}
        .speaker { font-size: 11px; font-weight: bold; color: #7f8c8d; display: block; margin-bottom: 4px; }
        
        .eng { font-size: 19px; color: #2c3e50; font-weight: bold; display: block; }
        .amh { font-size: 15px; color: #555; display: block; margin-top: 4px; }
        .listen-hint { font-size: 11px; color: #e67e22; font-style: italic; display: block; margin-top: 4px; }
        
        .vocab-grid { display: flex; flex-direction: column; gap: 4px; margin-top: 5px; }
        .vocab-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 8px; border-bottom: 1px solid #eef2f3; cursor: pointer; background: white; border-radius: 8px; }
        .vocab-row:hover { background: #fdfdfd; }
        .vocab-row:last-child { border-bottom: none; }
    </style>
</head>

    <div class="roadmap-stack" id="accordionStack"></div>

                    { eng: "Happy / Glad", amh: "ደስተኛ" }, { eng: "Tired / Exhausted", amh: "የደከመው" },
                    { eng: "Hungry", amh: "የራበው" }, { eng: "Thirsty", amh: "የጠማው" },
                    { eng: "Sick / Unwell", amh: "የታመመ" }, { eng: "Sleepy", amh: "እንቅልፍ የመጣው" }
                ]
            },
            weather: { amh: "የአየር ንብረት", eng: "Weather & Nature", icon: "☀️", 
                dialogue: [
                    { speaker: "አባት (Father)", eng: "It is very hot and sunny today.", amh: "ዛሬ በጣም ሞቃትና ፀሐያማ ነው።", type: "A" },
                    { speaker: "እናት (Mother)", eng: "Yes, but the news says it will be rainy and cold tomorrow.", amh: "አዎ፣ ግን ዜናው ነገ ዝናባማና ቀዝቃዛ ይሆናል ይላል።", type: "B" },
                    { speaker: "አባት (Father)", eng: "Then I will stay inside and watch television.", amh: "እንግዲያውስ እቤት እቆያለሁ ቴሌቪዥን እያየሁ።", type: "A" }
                ],
                vocab: [
                    { eng: "Hot / Sunny", amh: "ሞቃት / ፀሐያማ" }, { eng: "Rainy / Wet", amh: "ዝናባማ" },
                    { eng: "Cold / Windy", amh: "ቀዝቃዛ / ንፋስ የበዛበት" }, { eng: "Cloudy", amh: "ደመናማ" },
                    { eng: "Sun and Moon", amh: "ፀሐይ እና ጨረቃ" }, { eng: "Sky and Clouds", amh: "ሰማይ እና ደመና" }
                ]
            },
            tech: { amh: "ቴክኖሎጂ", eng: "Important Tech", icon: "📱", 
                dialogue: [
                    { speaker: "አባት (Father)", eng: "Can you help me connect my mobile phone to the Wi-Fi?", amh: "ሞባይል ስልኬን ከዋይፋይ ጋር ላገናኘው ልትረዳኝ ትችላለህ?", type: "A" },
                    { speaker: "ልጅ (Child)", eng: "Yes, Grandpa. Let me type the password for you.", amh: "አዎ አያቴ። የይለፍ ቃሉን (ፓስዎርድ) ልጻፍልህ።", type: "B" },
                    { speaker: "አባት (Father)", eng: "Thank you. Call me if your mother sends a text message.", amh: "አመሰግናለሁ። እናትህ የጽሑፍ መልዕክት ከላከች ጥራኝ።", type: "A" }
                ],
                vocab: [
                    { eng: "Mobile Phone", amh: "ስልክ / ሞባይል" }, { eng: "Television / Radio", amh: "ቴሌቪዥን / ሬዲዮ" },
                    { eng: "Computer / Charger", amh: "ኮምፒውተር / ቻርጀር" }, { eng: "Internet / Wi-Fi", amh: "ኢንተርኔት / ዋይፋይ" },
                    { eng: "Text Message", amh: "የጽሑፍ መልዕክት" }, { eng: "Password", amh: "የይለፍ ቃል" }
                ]
            },
            days: { amh: "የሳምንቱ ቀናት", eng: "Days of the Week", icon: "📅", 
                dialogue: [
                    { speaker: "እናት (Mother)", eng: "Do we have church on Sunday morning?", amh: "እሁድ ጠዋት ቤተክርስቲያን መሄድ አለብን?", type: "A" },
                    { speaker: "አባት (Father)", eng: "Yes, and on Monday I need to go to the bank.", amh: "አዎ፣ ሰኞ ዕለት ደግሞ ባንክ ቤት መሄድ አለብኝ።", type: "B" },
                    { speaker: "እናት (Mother)", eng: "Perfect. We can rest over the weekend.", amh: "በጣም ጥሩ። ቅዳሜና እሁድ (ዊኬንድ) ላይ ማረፍ እንችላለን።", type: "A" }
                ],
                vocab: [
                    { eng: "Monday / Tuesday", amh: "ሰኞ / ማክሰኞ" }, { eng: "Wednesday / Thursday", amh: "ረቡዕ / ሐሙስ" },
                    { eng: "Friday", amh: "አርብ" }, { eng: "Saturday / Sunday", amh: "ቅዳሜ / እሁድ" },
                    { eng: "Weekend", amh: "የሳምንቱ መጨረሻ (ቅዳሜና እሁድ)" }, { eng: "Week / Month", amh: "ሳምንት / ወር" }
                ]
            },
            kitchen: { amh: "ወጥ ቤት ዕቃዎች", eng: "Kitchen Tools", icon: "🍳", 
                dialogue: [
                    { speaker: "አባት (Father)", eng: "Where is the large knife? I need to slice the bread.", amh: "ትልቁ ቢላዋ የት አለ? ዳቦውን መቁረጥ ፈልጌ ነበር።", type: "A" },
                    { speaker: "እናት (Mother)", eng: "It is in the drawer next to the spoons and forks.", amh: "ካቢኔው መሳቢያ ውስጥ ከማንኪያዎችና ሹካዎች አጠገብ ነው።", type: "B" },
                    { speaker: "አባት (Father)", eng: "Found it. Pass me a clean plate and cup too, please.", amh: "አገኘሁት። እባክሽ ንፁህ ሳህንና ሲኒም አብረሽ ስጪኝ።", type: "A" }
                ],
                vocab: [
                    { eng: "Plate / Bowl", amh: "ሳህን" }, { eng: "Spoon / Fork / Knife", amh: "ማንኪያ / ሹካ / ቢላዋ" },
                    { eng: "Cup / Glass", amh: "ሲኒ / ብርጭቆ" }, { eng: "Pot / Pan", amh: "ድስት / መጥበሻ" },
                    { eng: "Stove / Oven", amh: "ምድጃ / ማብሰያ" }, { eng: "Salt / Pepper", amh: "ጨው / ቁንዶ በርበሬ" }
                ]
            },
            animals: { amh: "እንስሳት", eng: "Animals & Pets", icon: "🐕", 
                dialogue: [
                    { speaker: "ልጅ (Child)", eng: "Grandpa, your dog is jumping! He is very happy.", amh: "አያቴ፣ ውሻህ እየዘለለ ነው! በጣም ደስ ብሎታል።", type: "A" },
                    { speaker: "አባት (Father)", eng: "Yes, he is a one-year-old golden retriever. He loves playing.", amh: "አዎ፣ የአንድ ዓመት ጎልደን ሪትሪቨር ነው። መጫወት በጣም ይወዳል።", type: "B" },
                    { speaker: "ልጅ (Child)", eng: "Look, there is a small bird sitting on the tree branch.", amh: "እይ፣ ዛፉ ቅርንጫፍ ላይ አንድ ትንሽ ወፍ ተቀምጣለች።", type: "A" }
                ],
                vocab: [
                    { eng: "Dog / Cat", amh: "ውሻ / ድመት" }, { eng: "Golden Retriever", amh: "ጎልደን ሪትሪቨር" },
                    { eng: "Bird / Chicken", amh: "ወፍ / ዶሮ" }, { eng: "Cow / Sheep", amh: "ላም / በግ" },
                    { eng: "Horse", amh: "ፈረስ" }, { eng: "Animal / Pet", amh: "እንስሳ / የቤት እንስሳ" }
                ]
            },
            conclusion: { amh: "ማጠቃለያ", eng: "Conclusion & Praise", icon: "🎓", 
                dialogue: [
                    { speaker: "እናት (Mother)", eng: "Congratulations! You completed all the courses!", amh: "እንኳን ደስ አለዎት! ሁሉንም ትምህርቶች ጨርሰዋል!", type: "A" },
                    { speaker: "አባት (Father)", eng: "Thank you so much! I can speak and understand English now!", amh: "በጣም አመሰግናለሁ! አሁን እንግሊዝኛ መናገርም መረዳትም እችላለሁ!", type: "B" },
                    { speaker: "ልጅ (Child)", eng: "Great job, Baba! We are proud of you!", amh: "ጎበዝ ባባ! እንኮራብሃለን!", type: "A" }
                ],
                vocab: [
                    { eng: "Congratulations", amh: "እንኳን ደስ አለዎት" }, { eng: "Complete / Finished", amh: "የተጠናቀቀ / የጨረሰ" },
                    { eng: "Speak / Talk", amh: "መናገር / ማውራት" }, { eng: "Understand", amh: "መረዳት / ማስተዋል" },
                    { eng: "Proud", amh: "መኩራት / ኩራት" }, { eng: "Learn", amh: "መማር" }
                ]
            }
        };

        const stackContainer = document.getElementById("accordionStack");
        Object.keys(contentDatabase).forEach(key => {
            const item = contentDatabase[key];
            const card = document.createElement("div");
            card.className = "module-card";
            card.id = `card-${key}`;

            const header = document.createElement("div");
            header.className = "card-header";
            header.onclick = () => toggleCard(key);
            header.innerHTML = `
                <div class="header-main-info">
                    <div class="avatar-circle">${item.icon}</div>
                    <div class="title-txt-block">
                        <span class="title-amh">${item.amh}</span>
                        <span class="title-eng">${item.eng}</span>
                    </div>
                </div>
                <div class="chevron">▼</div>
            `;

            const content = document.createElement("div");
            content.className = "card-content";

            // 1. Add Dialogues section
            const diagDivider = document.createElement("div");
            diagDivider.className = "section-divider";
            diagDivider.innerText = "🗣️ ንግግር (Dialogues)";
            content.appendChild(diagDivider);

            item.dialogue.forEach(line => {
                const bubble = document.createElement("div");
                bubble.className = `bubble char-${line.type}`;
                bubble.innerHTML = `
                    <span class="speaker">👤 ${line.speaker}</span>
                    <span class="eng">${line.eng}</span>
                    <span class="amh">${line.amh}</span>
                    <span class="listen-hint">🔊 ለመስማት ይጫኑ (Tap to hear)</span>
                `;
                bubble.onclick = (e) => { e.stopPropagation(); playAudio(line.eng); };
                content.appendChild(bubble);
            });

            // 2. Add Vocabulary section
            const vocabDivider = document.createElement("div");
            vocabDivider.className = "section-divider";
            vocabDivider.innerText = "📖 ቃላት (Vocabulary)";
            content.appendChild(vocabDivider);

            const grid = document.createElement("div");
            grid.className = "vocab-grid";

            item.vocab.forEach(word => {
                const row = document.createElement("div");
                row.className = "vocab-row";
                row.innerHTML = `
                    <div>
                        <span class="eng" style="font-size:18px; display:block; font-weight:bold;">${word.eng}</span>
                        <span class="amh" style="font-size:14px; display:block; color:#555; margin-top:2px;">${word.amh}</span>
                    </div>
                    <div style="font-size:20px; color:#2980b9;">🔊</div>
                `;
                row.onclick = (e) => { e.stopPropagation(); playAudio(word.eng); };
                grid.appendChild(row);
            });

            content.appendChild(grid);
            card.appendChild(header);
            card.appendChild(content);
            stackContainer.appendChild(card);
        });

        function toggleCard(key) {
            const targetedCard = document.getElementById(`card-${key}`);
            const isCurrentlyActive = targetedCard.classList.contains("active");
            document.querySelectorAll(".module-card").forEach(c => c.classList.remove("active"));
            if (!isCurrentlyActive) {
                targetedCard.classList.add("active");
                setTimeout(() => { targetedCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 200);
            }
        }

        function playAudio(phrase) {
            window.speechSynthesis.cancel(); 
            let utterance = new SpeechSynthesisUtterance(phrase);
            utterance.lang = 'en-US';
            utterance.rate = 0.68; 
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
